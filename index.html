<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>音视频服务器</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/video.css">
    <link rel="stylesheet" href="css/controls.css">
    <link rel="stylesheet" href="css/connection-panel.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- 侧边栏遮罩 (移动端) -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <div class="app-layout">
        <!-- ========== 侧边栏 ========== -->
        <nav class="sidebar" id="sidebar">
            <div class="server-header">
                <span>服务器</span>
                <button class="hamburger-btn" onclick="toggleSidebar()" title="菜单">☰</button>
            </div>

            <div class="channel-list">
                <div class="category-title">🔊 语音分组</div>
                <div class="voice-channel" id="voice-channel-btn" onclick="toggleVoiceRoom()">
                    <span>🔈</span> <span id="voice-room-title">大厅 (点击加入)</span>
                </div>
                <div class="voice-users" id="voice-users-container"></div>
            </div>

            <!-- 连接诊断面板 -->
            <div>
                <button class="diag-toggle-btn" onclick="toggleConnectionPanel()">
                    📡 网络诊断
                </button>
                <div class="connection-panel" id="connection-panel">
                    <div class="connection-panel-inner">
                        <div class="panel-section-title">本机网络</div>
                        <div class="local-net-info" id="local-net-info">
                            <div class="net-info-row"><span class="value">发现中...</span></div>
                        </div>
                        <div class="panel-section-title">对端节点</div>
                        <div id="peer-diag-list"></div>
                    </div>
                </div>
            </div>

            <!-- 底部用户状态栏 -->
            <div class="user-bar">
                <div class="user-info">
                    <div class="my-avatar" id="my-avatar-icon" onclick="changeName()" title="点击改名">U</div>
                    <div>
                        <div class="my-name" id="my-name-display" onclick="changeName()" title="点击改名">读取中...</div>
                        <div class="my-id" id="my-id-display" onclick="copyMyId()" title="点击复制完整 ID">连接信令...</div>
                    </div>
                </div>

                <div class="control-btns">
                    <div class="icon-btn-wrapper">
                        <button class="icon-btn" onclick="resetConfig()" title="修改密码">⚙️</button>
                    </div>
                    <div class="icon-btn-wrapper">
                        <button class="icon-btn" id="mic-btn" onclick="toggleMic()" title="开关麦克风 (Ctrl+M)">🎤</button>
                        <div class="hover-volume-popup">
                            <span class="vol-label">麦克风输出增益</span>
                            <input type="range" id="mic-volume" min="0" max="2" step="0.1" value="1" oninput="changeMicGain(this.value)">
                        </div>
                    </div>
                    <div class="icon-btn-wrapper">
                        <button class="icon-btn" id="speaker-btn" onclick="toggleSpeaker()" title="开关扬声器 (Ctrl+D)">🎧</button>
                        <div class="hover-volume-popup">
                            <span class="vol-label">全局接收音量</span>
                            <input type="range" id="master-volume" min="0" max="1" step="0.05" value="1" oninput="changeMasterVolume(this.value)">
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- ========== 主内容区 ========== -->
        <main class="main-content">
            <div class="top-bar">
                <button class="hamburger-btn" onclick="toggleSidebar()" title="菜单 (Ctrl+B)">☰</button>
                <span style="color:var(--text-muted); font-weight:bold; margin-right:10px;"># 频道</span>

                <div id="connect-area" style="display:flex; align-items:center; gap:8px;">
                    <input type="text" id="target-id" placeholder="👉 粘贴朋友 ID" onkeypress="if(event.key==='Enter') connectToMesh()">
                    <button class="btn-primary" onclick="connectToMesh()">连接入网</button>
                </div>

                <div id="room-status-area" style="display:none; align-items:center; gap:12px;">
                    <div class="badge success">🟢 频道活跃中</div>
                    <div id="top-room-id" class="badge" onclick="copyRoomId()" title="点击复制房间 ID">房间 ID: 读取中...</div>
                    <span style="font-size:0.9rem; color:var(--text-muted);">
                        在线节点: <span id="mesh-node-count" style="color:white; font-weight:bold;">1</span>
                    </span>
                    <button id="disconnect-btn" class="btn-danger" style="padding: 4px 10px; font-size: 0.85rem;" onclick="disconnectMesh()">断开</button>
                </div>

                <div class="spacer"></div>

                <div class="divider hide-mobile"></div>
                <select id="video-quality" class="quality-select" style="margin-right:8px;">
                    <option value="auto">画质: 自动</option>
                    <option value="1080p60">1080p*60fps 高清</option>
                    <option value="1080p">1080p*30fps 高清</option>
                    <option value="720p">720p*30fps 标清</option>
                    <option value="480p">480p*15fps 省流</option>
                </select>
                <button class="btn-primary" id="share-btn" onclick="toggleShare()">发起投屏</button>
                <button class="btn-danger" id="hangup-btn" style="display:none;" onclick="hangUpScreen()">断开看屏</button>
            </div>

            <div class="content-body">
                <div class="video-wrapper" id="video-container" style="display:none;">
                    <video id="remote-video" autoplay playsinline controls></video>
                </div>

                <div class="chat-area">
                    <div class="chat-history" id="chat-box">
                        <div class="msg-system">
                            欢迎来到服务器。建立数据连接后即可开始聊天。
                        </div>
                    </div>
                    <div class="chat-input-wrapper">
                        <span class="prefix">+</span>
                        <input type="text" id="chat-input" placeholder="发消息..." onkeypress="handleChatEnter(event)">
                    </div>
                </div>
            </div>

            <div id="audio-container" style="display:none;"></div>
        </main>
    </div>

    <!-- 全局个人音量弹窗 -->
    <div id="personal-vol-popup">
        <span style="font-size: 0.8rem; font-weight: bold; color: var(--text-muted);" id="personal-vol-name">调节音量</span>
        <input type="range" id="personal-vol-slider" min="0" max="1" step="0.05" value="1">
    </div>

    <!-- 外部依赖 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <!-- 应用模块 (按依赖顺序加载) -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/peer.js"></script>
    <script src="js/mesh.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/screen.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/connection-diagnostics.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
